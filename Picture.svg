<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">TC DIEX illustration</title>
  <desc id="desc">Abstract technical illustration with brand colors and label TC DIEX</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)"/>
  <g transform="translate(80,80)">
    <rect x="0" y="0" width="440" height="280" rx="20" fill="#4F46E5" opacity="0.12"/>
    <rect x="160" y="120" width="720" height="420" rx="30" fill="#4338CA" opacity="0.08"/>
    <circle cx="300" cy="220" r="72" fill="#4F46E5" opacity="0.15"/>
    <rect x="680" y="80" width="320" height="160" rx="16" fill="#4F46E5" opacity="0.16"/>
    <g transform="translate(220,140)">
      <path d="M0 80 L40 0 L120 160 L200 40 L260 120" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    </g>
    <text x="520" y="380" font-family="Inter, Arial, sans-serif" font-size="42" fill="#1E293B" font-weight="700">TC DIEX</text>
    <text x="520" y="420" font-family="Inter, Arial, sans-serif" font-size="20" fill="#334155">Технічний центр діагностики та експертизи</text>
  </g>
  <g transform="translate(60,560)">
    <rect x="0" y="0" width="1080" height="160" rx="12" fill="#fff" opacity="0.92"/>
    <text x="30" y="70" font-family="Inter, Arial, sans-serif" font-size="28" fill="#0F172A" font-weight="700">Професійний супровід та експертиза</text>
    <text x="30" y="110" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0F172A">сертифікація та випробування обладнання</text>
</svg>
