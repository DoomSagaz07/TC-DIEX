<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НВП «ТЦ DIEX» — Головна</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f8fafc; color: #111827; font-family: Inter, system-ui, sans-serif; }
        .container { text-align: center; padding: 2rem; max-width: 56rem; width: 100%; }
        .buttons { display: grid; gap: 1rem; }
        .button { display: inline-flex; align-items: center; justify-content: center; padding: 1rem 1.75rem; border-radius: 999px; background: #4f46e5; color: white; text-decoration: none; font-weight: 700; box-shadow: 0 18px 45px rgba(79,70,229,0.18); transition: transform .2s ease, background .2s ease; }
        .button:hover { transform: translateY(-2px); background: #4338ca; }
        .button.disabled { background: #b3c4de; cursor: not-allowed; box-shadow: none; }
        .button.disabled:hover { transform: none; background: #d1d5db; }
        @media (min-width: 640px) { .buttons { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    </style>
</head>
<body>

        <div class="buttons">

        </div>
    </div>
</body>
